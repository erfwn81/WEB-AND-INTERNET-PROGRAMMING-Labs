# ==========================================
# MySQL Database Configuration
# ==========================================
# Change username/password to match your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/cs3220_lab11?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
# 'update' auto-creates tables on first run, then updates schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Freemarker
# ==========================================
spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.suffix=.ftlh
spring.freemarker.cache=false
spring.freemarker.charset=UTF-8
spring.freemarker.expose-spring-macro-helpers=true

# ==========================================
# App
# ==========================================
server.port=8080
spring.application.name=JPA
